<header class="contact-header">
    <h1>Contactez-nous</h1>
</header>

<section class="contact-container">

    <!-- Infos -->
    <div class="contact-info">
        <h2>Nos informations</h2>
        <p>📍 Layoune</p>
        <p>📞 212 6 84 39 54 10</p>
        <p>📧 moustaphabouhahmed@gmail.com</p>
    </div>

    <!-- Formulaire -->
    <div class="contact-form">
        <h2>Envoyer un message</h2>

        <form>
            <input type="text" placeholder="Votre nom" required>
            <input type="email" placeholder="Votre email" required>
            <textarea placeholder="Votre message" required></textarea>
            <button type="submit">Envoyer</button>
        </form>
    </div>

</section>

    <div class="map-container">

            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3323.0!2d-7.5898!3d33.5731!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2sCasablanca!5e0!3m2!1sfr!2sma!4v0000000000"
            width="100%" 
            height="350" 
            style="border:0;"
